name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Create and Configure App
      run: |
        flutter create fruit_guardian
        cp -r lib fruit_guardian/
        cp pubspec.yaml fruit_guardian/
        cp -r assets fruit_guardian/
        cd fruit_guardian
        sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" />\n    <uses-feature android:name="android.hardware.camera.autofocus" />' android/app/src/main/AndroidManifest.xml
        sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
        flutter pub get
        flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FruitGuardian-App
        path: fruit_guardian/build/app/outputs/flutter-apk/app-release.apk
